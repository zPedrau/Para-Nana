<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Todas as Nossas Perfeições</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(32px, env(safe-area-inset-bottom));
            padding-left: max(12px, env(safe-area-inset-left));
            padding-right: max(12px, env(safe-area-inset-right));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b18bff 0%, #9b6dff 50%, #d8c4ff 100%);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            text-align: center;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('assets/nana-portrait.png') center center / cover no-repeat;
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .page {
            width: 100%;
            max-width: 800px;
            padding: 32px 24px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(1.35rem, 5.5vw, 2.15rem);
            margin: 0 0 14px;
            line-height: 1.3;
            word-wrap: break-word;
            font-weight: 800;
            color: #d4b8ff;
            letter-spacing: 0.01em;
            text-shadow: 0 2px 16px rgba(177, 139, 255, 0.4);
        }

        .subtitle {
            font-size: clamp(0.95rem, 3.8vw, 1.2rem);
            line-height: 1.55;
            margin: 0 0 28px;
            color: rgba(255, 255, 255, 0.92);
            font-weight: 400;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 0 auto 28px;
            max-width: 640px;
        }

        .photos-grid img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            object-position: center center;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .btn {
            display: inline-block;
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            min-height: 48px;
            touch-action: manipulation;
            line-height: 1.2;
        }

        .btn:hover {
            background-color: #f50057;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                padding-top: max(10px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .page {
                padding: 22px 16px;
                border-radius: 16px;
            }

            .photos-grid {
                gap: 10px;
            }

            .photos-grid img {
                border-radius: 12px;
            }
        }

        @media (min-width: 601px) {
            body {
                padding: 28px 24px;
                align-items: center;
            }

            .page {
                width: 92%;
                padding: 44px 40px;
                border-radius: 24px;
            }

            .photos-grid {
                gap: 20px;
            }
        }

        @media (min-width: 900px) {
            .page {
                max-width: 820px;
                padding: 48px 52px;
            }

            h1 {
                font-size: 2.15rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Todas as Nossas Perfeições</h1>
        <p class="subtitle">Quatro fotinhas do início da história.</p>

        <div class="photos-grid">
            <img
                src="assets/momento-1.png"
                alt="Nós dois sorrindo juntos"
            >
            <img
                src="assets/momento-2.png"
                alt="Selfie nossa à noite"
            >
            <img
                src="assets/momento-3.png"
                alt="Selfie no espelho juntos"
            >
            <img
                src="assets/momento-4.png"
                alt="Nossa foto favorita no shopping"
            >
        </div>

        <a class="btn" href="index.html">Voltar</a>
    </div>
</body>
</html>
