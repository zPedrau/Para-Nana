<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>O dia do nosso primeiro beijo</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(32px, env(safe-area-inset-bottom));
            padding-left: max(12px, env(safe-area-inset-left));
            padding-right: max(12px, env(safe-area-inset-right));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b18bff 0%, #9b6dff 50%, #d8c4ff 100%);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            text-align: center;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('assets/nana-portrait.png') center center / cover no-repeat;
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .page {
            width: 100%;
            max-width: 800px;
            padding: 32px 24px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(1.25rem, 5vw, 2rem);
            margin: 0 0 24px;
            line-height: 1.35;
            word-wrap: break-word;
            font-weight: 600;
        }

        .hero-photo {
            width: 100%;
            max-width: 520px;
            margin: 0 auto 28px;
            display: block;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
            background: rgba(255, 255, 255, 0.06);
        }

        .photos-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .photos-row img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            object-position: center top;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .btn {
            display: inline-block;
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
            min-height: 48px;
            touch-action: manipulation;
            line-height: 1.2;
        }

        .btn:hover {
            background-color: #f50057;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                padding-top: max(10px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .page {
                padding: 22px 16px;
                border-radius: 16px;
            }

            .photos-row {
                gap: 10px;
            }

            .photos-row img {
                border-radius: 12px;
            }
        }

        @media (min-width: 601px) {
            body {
                padding: 28px 24px;
                align-items: center;
            }

            .page {
                width: 92%;
                padding: 44px 40px;
                border-radius: 24px;
            }

            .photos-row {
                gap: 20px;
                max-width: 640px;
                margin-left: auto;
                margin-right: auto;
            }
        }

        @media (min-width: 900px) {
            .page {
                max-width: 820px;
                padding: 48px 52px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>O dia do nosso primeiro beijo. é, e o dia mais especial, e o dia que você ganhou a estrela.</h1>

        <img
            class="hero-photo"
            src="assets/estrela-mapa.png"
            alt="Mapa do céu estrelado sobre Uberaba em 24 de março de 2026 às 20:50"
        >

        <div class="photos-row">
            <img
                src="assets/meus-amores-1.png"
                alt="Selfie no espelho com o ursinho branco e beijinho"
            >
            <img
                src="assets/meus-amores-2.png"
                alt="Selfie no espelho sorrindo com o ursinho branco"
            >
        </div>

        <a class="btn" href="index.html">Voltar</a>
    </div>
</body>
</html>
